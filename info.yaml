# Tiny Tapeout project information
project:
  title:        "Spiking Pattern Recognition Core"      # Project title
  author:       "Terdoo Osu"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A LIF neuron core that triggers an event when a target spike pattern is detected."      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     2       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_Terdoo_Osu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - tt_um_Terdoo_Osu.sv
    - control_unit_W.sv
    - lif_W.sv
    - neuron_state_W.sv
    - sipo.sv
    - synapse_mem_W.sv
    - core.sv
    
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "input-switch-N1"
  ui[1]: "input-switch-N2"
  ui[2]: "input-switch-N3"
  ui[3]: "input-switch-N4"
  ui[4]: "input-switch-pulse"
  ui[5]: "input signal"
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "green-led"
  uo[1]: "actuator"
  uo[2]: "red-led-s1" #here s denotes spike, these leds show the current spike pattern
  uo[3]: "red-led-s2"
  uo[4]: "red-led-s3"
  uo[5]: "red-led-s4"
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins # here p denotes pattern, these leds display the pattern entered by the user
  uio[0]: "red-led-p1"
  uio[1]: "red-led-p2"
  uio[2]: "red-led-p3"
  uio[3]: "red-led-p4"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
